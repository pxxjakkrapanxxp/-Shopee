    // ฟังก์ชันสร้างและแสดงผลการ์ดร้านค้า
    function renderShops(filterCat) {
        const container = document.getElementById('shop-container');
        container.innerHTML = ''; // เคลียร์หน้าเก่า

        const filtered = shopsData.filter(shop => shop.cat === filterCat);

        filtered.forEach(shop => {
            const card = document.createElement('div');
            card.className = 'shop-card';
            card.innerHTML = `
                <div class="shop-header">
                    <h3 class="shop-title">🏪 ร้าน ${shop.name}</h3>
                    <div class="stars">${shop.star}</div>
                </div>
                <p class="shop-desc">"${shop.desc}"</p>
                <div class="btn-group">
                    <a href="${shop.aff}" target="_blank" class="shop-link">รับข้อเสนอพิเศษ (${shop.pct})</a>
                    <a href="${shop.shop}" target="_blank" class="shop-link secondary">หน้าร้านหลัก</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // ฟังก์ชันสลับเมนูหมวดหมู่และแบนเนอร์
    function filterCategory(catName) {
        // อัปเดตสถานะปุ่ม
        const btns = document.getElementsByClassName("tab-btn");
        for (let btn of btns) {
            btn.classList.remove("active");
        }
        event.currentTarget.classList.add("active");

        // อัปเดตแบนเนอร์
        const banners = document.getElementsByClassName("cat-banner");
        for (let banner of banners) {
            banner.classList.remove("active");
        }
        document.getElementById(`banner-${catName}`).classList.add("active");

        // แสดงผลร้านค้าในหมวดหมู่ที่เลือก
        renderShops(catName);
    }

    // เรียกแสดงผลเริ่มต้นที่หมวดหมู่แฟชั่น
    renderShops('fashion');
</script>
